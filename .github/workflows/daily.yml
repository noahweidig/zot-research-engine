name: Daily Literature Review

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC
  workflow_dispatch:       # Allow manual trigger

# Allow the workflow to commit reports and state back to the repository.
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_LIBRARY_TYPE: ${{ secrets.ZOTERO_LIBRARY_TYPE }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        run: python main.py

      - name: Commit report and state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ state/
          git commit -m "Daily report $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/
          retention-days: 90
