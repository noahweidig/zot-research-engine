# =============================================================================
# zot-research-engine — Configuration
# =============================================================================
# This is the ONLY file you need to edit to customize the pipeline.
# Every field is documented in the README under "Customization".
# Secrets are NEVER stored here — they come from environment variables.
# =============================================================================

search:
  # The list of search queries run against every enabled source.
  queries:
    - "large wildfire eastern united states"
    - "wildfire regimes eastern united states"
    - "social factors drivers of large wildfires"
    - "future climate scenarios wildfire risk united states"
    - "prescribed burn fire reduce wildfire risk"
  # Only consider papers published within the last N days.
  days_back: 7
  # Maximum number of results to request per query, per source.
  max_results_per_query: 50

relevance:
  # Minimum Gemini relevance score (1-5) required to be added to Zotero.
  min_score: 4
  # Free-text description of your research interests. Fed to Gemini to score
  # each paper. Be specific — this drives the whole relevance judgement.
  interests: >
    large wildfires eastern united states, prescribed burning eastern united states,
    drivers of large wildfires, ignition causes of large wildfires, 
    wildfire occurrence united states

zotero:
  # "user" or "group". Must match your ZOTERO_LIBRARY_TYPE env var.
  library_type: "user"
  # Name of the collection where new papers are filed. Created if missing.
  inbox_collection: "AI Inbox"

sources:
  # OpenAlex is the primary source and is always enabled.
  # Optional additional sources — set to true to enable. All are free and
  # require no API key (arXiv and Crossref honor OPENALEX_EMAIL politely).
  enable_semantic_scholar: false  # Abstract enrichment via DOI (not a search source)
  enable_arxiv: false             # Additional search source (preprints)
  enable_crossref: false          # Additional search source (published works)

pipeline:
  # Write logs to a file in addition to stdout.
  log_to_file: true
  log_file: "pipeline.log"
  # Maximum number of concurrent Gemini API calls.
  gemini_max_concurrency: 4

prefilter:
  # Free, local relevance pre-filter (BM25) that runs BEFORE Gemini. It ranks
  # every candidate against your interests using no API key and no quota, then
  # forwards only the most relevant papers to Gemini. This is what keeps the
  # free Gemini tier from being overwhelmed (the usual cause of 429 failures).
  enabled: true
  # Maximum number of papers sent to Gemini per run. Lower this if you still hit
  # Gemini quota limits; raise it if you want Gemini to see more candidates.
  top_k: 25
  # Drop papers whose normalized relevance (0-1, relative to the best match in
  # the batch) is below this before they reach Gemini. 0.0 keeps the full top_k.
  min_similarity: 0.0

gemini:
  # Gemini model id. See https://ai.google.dev/gemini-api/docs/models
  model: "gemini-2.0-flash"
  # 0.0 = fully deterministic scoring (recommended).
  temperature: 0.0
  # Cap on Gemini requests per minute. Keep at or below your tier's RPM limit
  # (the free tier is ~15 RPM) to avoid rate-limit (429) errors.
  requests_per_minute: 12
  # If Gemini is unavailable (e.g. daily quota exhausted), score the paper from
  # the free local prefilter instead of dropping it, so you still get a report.
  # Such papers are tagged "Heuristic Score" so they are easy to spot.
  fallback_to_prefilter: true
